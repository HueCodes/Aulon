# cargo-deny configuration for Aulon.
#
# Run locally:
#   cargo install --locked cargo-deny
#   cargo deny check
#
# CI runs the same command on every PR (see .github/workflows/ci.yml).
# Keep the policy strict: a permissive-license workspace and a small,
# audited dep tree are part of the project's pitch.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal path dependencies (e.g. aulon-core = { path = ".." })
# are unversioned because the workspace is never published; they should
# not trip the wildcards rule, which is aimed at "*" in published deps.
allow-wildcard-paths = true
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
